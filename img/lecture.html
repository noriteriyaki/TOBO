<section id="camcam-section">

      <div id="info-modal" class="modal hidden">
    <div class="modal-content">
      <img src="close.png" id="close-modal-btn" alt="Close" class="close-btn">
      
      <img src="" id="modal-info-img" alt="Informasi Detail" class="info-img-target">
</div>
  </div>
  
<script>
  // Ambil elemen pop-up nya
  const modal = document.getElementById('info-modal');
  const modalImg = document.getElementById('modal-info-img');
  const closeBtn = document.getElementById('close-modal-btn');

  // Fungsi buat nampilin pop-up
  function openModal(imageSrc) {
    modalImg.src = imageSrc;
    modal.classList.remove('hidden');
  }

  // Fungsi buat nutup pop-up
  closeBtn.addEventListener('click', function() {
    modal.classList.add('hidden');
  });

  // 1. KLIK DESIGNER
  document.getElementById('btn-designer').addEventListener('click', function() {
    openModal('inidesigner.png'); 
  });

  // 2. KLIK ENGINEER
  document.getElementById('btn-engineer').addEventListener('click', function() {
    openModal('iniengineer.png'); 
  }); // <--- INI DIA YANG TADI HILANG!

  // 3. KLIK DOSEN CEWEK
  document.getElementById('dosen-cewek').addEventListener('click', function() {
    openModal('iniexpertdosenibu.png'); 
  });

  // 4. KLIK DOSEN COWOK
  document.getElementById('dosen-cowok').addEventListener('click', function() {
    openModal('iniexpertbapak.png'); 
  });

  // 5. KLIK SEMUA LOGO PARTNER (partner-img)
  const partnerImgs = document.querySelectorAll('.partner-img');
  partnerImgs.forEach(function(img) {
    img.addEventListener('click', function() {
      openModal('inipartner.png'); // Udah aku tambahin huruf 'p' biar aman
    });
  });
</script>

</body>

</html>
